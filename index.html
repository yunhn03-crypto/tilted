<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>할일 관리 프로그램</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }
    .app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px;
    }
    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
      align-items: start;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.04);
      overflow: hidden;
    }
    .card-header {
      padding: 18px 20px 10px;
      border-bottom: 1px solid #f1f5f9;
    }
    .card-title {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
    }
    .card-body {
      padding: 16px 20px 20px;
    }
    .section { margin-bottom: 14px; }
    .label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }
    .sub-label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 700;
      color: #475569;
    }
    input, select, textarea, button {
      font: inherit;
    }
    input[type="text"],
    input[type="date"],
    input[type="month"],
    textarea,
    select {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 12px 14px;
      background: #fff;
    }
    textarea {
      min-height: 110px;
      resize: vertical;
    }
    .btn {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      background: #111827;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .btn:hover { opacity: 0.92; }
    .btn-inline {
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 10px 12px;
      background: #fff;
      cursor: pointer;
      font-weight: 700;
    }
    .btn-inline:hover { background: #f8fafc; }
    .guide {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      font-size: 13px;
      line-height: 1.5;
      color: #475569;
    }
    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .tab-btn {
      border: 1px solid #d1d5db;
      background: #fff;
      border-radius: 14px;
      padding: 12px 10px;
      font-weight: 700;
      cursor: pointer;
    }
    .tab-btn.active {
      background: #111827;
      color: #fff;
      border-color: #111827;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .toolbar-title {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
    }
    .toolbar-control {
      width: 190px;
      max-width: 100%;
    }
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .task-item {
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 14px;
      background: #fff;
    }
    .task-item.completed {
      opacity: 0.6;
    }
    .task-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .task-main {
      flex: 1;
      min-width: 0;
    }
    .task-title-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .task-title {
      font-size: 16px;
      font-weight: 700;
      word-break: break-word;
    }
    .task-title.done {
      text-decoration: line-through;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid #d1d5db;
      background: #f8fafc;
      color: #334155;
    }
    .badge.dark {
      background: #eef2ff;
      border-color: #c7d2fe;
      color: #3730a3;
    }
    .task-memo {
      margin-top: 6px;
      font-size: 14px;
      line-height: 1.5;
      color: #475569;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
      font-size: 12px;
      color: #64748b;
    }
    .task-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .task-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      background: #fff;
      cursor: pointer;
      font-size: 16px;
    }
    .icon-btn:hover { background: #f8fafc; }
    .empty {
      border: 1px dashed #cbd5e1;
      border-radius: 18px;
      padding: 30px 16px;
      text-align: center;
      color: #64748b;
      background: #fff;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 16px;
    }
    .grid-2-equal {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .small-note {
      margin-bottom: 12px;
      font-size: 13px;
      color: #64748b;
    }
    .field-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .field-row > * { flex: 1; }
    .tag-select-box {
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 10px;
      background: #fff;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 48px;
    }
    .tag-check {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border: 1px solid #d1d5db;
      border-radius: 999px;
      background: #f8fafc;
      font-size: 13px;
      cursor: pointer;
    }
    .tag-check input { width: auto; margin: 0; }
    .tag-manage-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
    }
    .tag-manage-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: #fff;
    }
    .tag-manage-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .search-box {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .search-result-count {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 12px;
    }

    @media (max-width: 1100px) {
      .layout,
      .grid-2,
      .grid-2-equal,
      .search-box {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .app { padding: 12px; }
      .card-header { padding: 16px 16px 10px; }
      .card-body { padding: 14px 16px 16px; }
      .tabs { grid-template-columns: repeat(2, 1fr); }
      .task-row { gap: 10px; }
      .task-actions { flex-direction: column; }
      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }
      .toolbar-control { width: 100%; }
      .field-row {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="layout">
      <div class="card">
        <div class="card-header">
          <h1 class="card-title">할일 관리</h1>
        </div>
        <div class="card-body">
          <div class="section">
            <label class="label">분류</label>
            <select id="taskType">
              <option value="daily">당일 할일</option>
              <option value="weekly">그주 할일</option>
              <option value="monthly">그달 할일</option>
            </select>
          </div>

          <div class="section" id="dailyDateWrap">
            <label class="label">날짜</label>
            <input type="date" id="dailyDate" />
          </div>

          <div class="section" id="weeklyDateWrap" style="display:none;">
            <label class="label">주 시작일(월요일)</label>
            <input type="date" id="weeklyDate" />
          </div>

          <div class="section" id="monthlyDateWrap" style="display:none;">
            <label class="label">월</label>
            <input type="month" id="monthlyDate" />
          </div>

          <div class="section">
            <label class="label">할일 제목</label>
            <input type="text" id="taskTitle" placeholder="예: 거래처 견적 발송" />
          </div>

          <div class="section">
            <label class="label">메모</label>
            <textarea id="taskMemo" placeholder="상세 내용, 체크 포인트"></textarea>
          </div>

          <div class="section">
            <label class="label">태그 선택</label>
            <div class="tag-select-box" id="taskTagSelectBox"></div>
          </div>

          <button class="btn" id="addTaskBtn">추가</button>

          <div class="guide">
            태그는 아래의 태그 관리에서 별도로 등록합니다.<br>
            일정 등록 시에는 등록된 태그를 선택해서 붙일 수 있습니다.<br>
            미완료 업무는 다음 날짜·주·월로 자동 이월됩니다.
          </div>

          <div class="section" style="margin-top:16px;">
            <label class="label">태그 관리</label>
            <div class="field-row">
              <input type="text" id="newTagName" placeholder="예: 영업" />
              <button class="btn-inline" id="addTagBtn" type="button">태그 추가</button>
            </div>
            <div class="tag-manage-list" id="tagManageList"></div>
          </div>
        </div>
      </div>

      <div>
        <div class="tabs">
          <button class="tab-btn active" data-tab="daily">당일</button>
          <button class="tab-btn" data-tab="weekly">주간</button>
          <button class="tab-btn" data-tab="monthly">월간</button>
          <button class="tab-btn" data-tab="search">검색</button>
        </div>

        <div id="content"></div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'todo-manager-pc-mobile-v2';

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function todayKey(date = new Date()) {
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
    }

    function monthKey(date = new Date()) {
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}`;
    }

    function getWeekStart(date = new Date()) {
      const d = new Date(date);
      const day = d.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      d.setDate(d.getDate() + diff);
      d.setHours(0, 0, 0, 0);
      return d;
    }

    function weekKey(date = new Date()) {
      return todayKey(getWeekStart(date));
    }

    function addDays(date, days) {
      const d = new Date(date);
      d.setDate(d.getDate() + days);
      return d;
    }

    function nextDayKey(key) {
      return todayKey(addDays(new Date(key), 1));
    }

    function nextWeekKey(key) {
      return todayKey(addDays(new Date(key), 7));
    }

    function nextMonthKey(key) {
      const [y, m] = key.split('-').map(Number);
      const d = new Date(y, m - 1, 1);
      d.setMonth(d.getMonth() + 1);
      return monthKey(d);
    }

    function formatWeekLabel(key) {
      const start = new Date(key);
      const end = addDays(start, 6);
      return `${todayKey(start)} ~ ${todayKey(end)}`;
    }

    function inWeek(dateKey, weekStartKey) {
      const d = new Date(dateKey);
      const start = new Date(weekStartKey);
      const end = addDays(start, 6);
      return d >= start && d <= end;
    }

    function sameMonth(dateKey, monthStr) {
      return dateKey.startsWith(monthStr);
    }

    function createDefaultData() {
      return {
        view: 'daily',
        filters: {
          date: todayKey(),
          week: weekKey(),
          month: monthKey()
        },
        search: {
          text: '',
          tagId: 'all'
        },
        tags: [
          { id: uid(), name: '중요' },
          { id: uid(), name: '업무' }
        ],
        tasks: []
      };
    }

    function loadData() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!parsed) return createDefaultData();
        if (!Array.isArray(parsed.tags)) parsed.tags = [];
        if (!parsed.search) parsed.search = { text: '', tagId: 'all' };
        parsed.tasks = (parsed.tasks || []).map(task => ({
          ...task,
          tagIds: Array.isArray(task.tagIds) ? task.tagIds : []
        }));
        return parsed;
      } catch {
        return createDefaultData();
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function uid() {
      return Date.now() + '-' + Math.random().toString(36).slice(2, 9);
    }

    function sortTasks(a, b) {
      if (a.completed !== b.completed) return a.completed ? 1 : -1;
      if (!a.completed && !b.completed && (a.rolledOverCount || 0) !== (b.rolledOverCount || 0)) {
        return (b.rolledOverCount || 0) - (a.rolledOverCount || 0);
      }
      return (b.updatedAt || 0) - (a.updatedAt || 0);
    }

    let state = loadData();

    function autoRollover() {
      const currentDate = todayKey();
      const currentWeek = weekKey();
      const currentMonth = monthKey();
      let changed = false;

      state.tasks = state.tasks.map(task => {
        if (task.completed) return task;

        if (task.type === 'daily' && task.dateKey < currentDate) {
          changed = true;
          return { ...task, dateKey: currentDate, rolledOverCount: (task.rolledOverCount || 0) + 1, updatedAt: Date.now() };
        }
        if (task.type === 'weekly' && task.weekKey < currentWeek) {
          changed = true;
          return { ...task, weekKey: currentWeek, rolledOverCount: (task.rolledOverCount || 0) + 1, updatedAt: Date.now() };
        }
        if (task.type === 'monthly' && task.monthKey < currentMonth) {
          changed = true;
          return { ...task, monthKey: currentMonth, rolledOverCount: (task.rolledOverCount || 0) + 1, updatedAt: Date.now() };
        }
        return task;
      });

      if (changed) saveData();
    }

    const els = {
      taskType: document.getElementById('taskType'),
      dailyDateWrap: document.getElementById('dailyDateWrap'),
      weeklyDateWrap: document.getElementById('weeklyDateWrap'),
      monthlyDateWrap: document.getElementById('monthlyDateWrap'),
      dailyDate: document.getElementById('dailyDate'),
      weeklyDate: document.getElementById('weeklyDate'),
      monthlyDate: document.getElementById('monthlyDate'),
      taskTitle: document.getElementById('taskTitle'),
      taskMemo: document.getElementById('taskMemo'),
      taskTagSelectBox: document.getElementById('taskTagSelectBox'),
      newTagName: document.getElementById('newTagName'),
      addTagBtn: document.getElementById('addTagBtn'),
      tagManageList: document.getElementById('tagManageList'),
      addTaskBtn: document.getElementById('addTaskBtn'),
      content: document.getElementById('content'),
      tabs: document.querySelectorAll('.tab-btn')
    };

    function getSelectedTagIds() {
      return [...document.querySelectorAll('input[name="taskTagIds"]:checked')].map(el => el.value);
    }

    function getTagName(tagId) {
      const tag = state.tags.find(t => t.id === tagId);
      return tag ? tag.name : '';
    }

    function getTaskTagBadges(task) {
      return (task.tagIds || [])
        .map(id => getTagName(id))
        .filter(Boolean)
        .map(name => `<span class="badge">#${escapeHtml(name)}</span>`)
        .join('');
    }

    function syncForm() {
      els.dailyDate.value = state.filters.date;
      els.weeklyDate.value = state.filters.week;
      els.monthlyDate.value = state.filters.month;
      const type = els.taskType.value;
      els.dailyDateWrap.style.display = type === 'daily' ? '' : 'none';
      els.weeklyDateWrap.style.display = type === 'weekly' ? '' : 'none';
      els.monthlyDateWrap.style.display = type === 'monthly' ? '' : 'none';
      els.tabs.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === state.view));
      renderTagSelectBox();
      renderTagManageList();
    }

    function renderTagSelectBox() {
      if (!state.tags.length) {
        els.taskTagSelectBox.innerHTML = '<span class="small-note">등록된 태그가 없습니다.</span>';
        return;
      }
      els.taskTagSelectBox.innerHTML = state.tags.map(tag => `
        <label class="tag-check">
          <input type="checkbox" name="taskTagIds" value="${tag.id}">
          <span>#${escapeHtml(tag.name)}</span>
        </label>
      `).join('');
    }

    function renderTagManageList() {
      if (!state.tags.length) {
        els.tagManageList.innerHTML = '<div class="empty">등록된 태그가 없습니다.</div>';
        return;
      }
      els.tagManageList.innerHTML = state.tags.map(tag => `
        <div class="tag-manage-item">
          <div>#${escapeHtml(tag.name)}</div>
          <div class="tag-manage-actions">
            <button class="icon-btn" type="button" onclick="editTag('${tag.id}')" title="수정">✎</button>
            <button class="icon-btn" type="button" onclick="deleteTag('${tag.id}')" title="삭제">🗑</button>
          </div>
        </div>
      `).join('');
    }

    function addTag() {
      const name = els.newTagName.value.trim();
      if (!name) return;
      if (state.tags.some(tag => tag.name.toLowerCase() === name.toLowerCase())) {
        alert('같은 이름의 태그가 이미 있습니다.');
        return;
      }
      state.tags.push({ id: uid(), name });
      els.newTagName.value = '';
      saveData();
      syncForm();
      render();
    }

    function editTag(tagId) {
      const tag = state.tags.find(t => t.id === tagId);
      if (!tag) return;
      const nextName = prompt('태그 이름 수정', tag.name);
      if (nextName === null) return;
      const cleanName = nextName.trim();
      if (!cleanName) return;
      if (state.tags.some(t => t.id !== tagId && t.name.toLowerCase() === cleanName.toLowerCase())) {
        alert('같은 이름의 태그가 이미 있습니다.');
        return;
      }
      tag.name = cleanName;
      saveData();
      syncForm();
      render();
    }

    function deleteTag(tagId) {
      const tag = state.tags.find(t => t.id === tagId);
      if (!tag) return;
      if (!confirm(`#${tag.name} 태그를 삭제할까요?`)) return;
      state.tags = state.tags.filter(t => t.id !== tagId);
      state.tasks = state.tasks.map(task => ({
        ...task,
        tagIds: (task.tagIds || []).filter(id => id !== tagId)
      }));
      if (state.search.tagId === tagId) state.search.tagId = 'all';
      saveData();
      syncForm();
      render();
    }

    function addTask() {
      const type = els.taskType.value;
      const title = els.taskTitle.value.trim();
      const memo = els.taskMemo.value.trim();
      const tagIds = getSelectedTagIds();
      if (!title) return;

      const task = {
        id: uid(),
        type,
        title,
        memo,
        tagIds,
        completed: false,
        rolledOverCount: 0,
        createdAt: Date.now(),
        updatedAt: Date.now(),
        dateKey: type === 'daily' ? state.filters.date : null,
        weekKey: type === 'weekly' ? state.filters.week : null,
        monthKey: type === 'monthly' ? state.filters.month : null
      };

      state.tasks.unshift(task);
      els.taskTitle.value = '';
      els.taskMemo.value = '';
      document.querySelectorAll('input[name="taskTagIds"]').forEach(el => { el.checked = false; });
      saveData();
      render();
    }

    function toggleTask(id) {
      state.tasks = state.tasks.map(task => task.id === id ? { ...task, completed: !task.completed, updatedAt: Date.now() } : task);
      saveData();
      render();
    }

    function deleteTask(id) {
      state.tasks = state.tasks.filter(task => task.id !== id);
      saveData();
      render();
    }

    function carryTask(id) {
      state.tasks = state.tasks.map(task => {
        if (task.id !== id) return task;
        if (task.type === 'daily') return { ...task, dateKey: nextDayKey(task.dateKey), rolledOverCount: (task.rolledOverCount || 0) + 1, updatedAt: Date.now() };
        if (task.type === 'weekly') return { ...task, weekKey: nextWeekKey(task.weekKey), rolledOverCount: (task.rolledOverCount || 0) + 1, updatedAt: Date.now() };
        return { ...task, monthKey: nextMonthKey(task.monthKey), rolledOverCount: (task.rolledOverCount || 0) + 1, updatedAt: Date.now() };
      });
      saveData();
      render();
    }

    function taskTypeLabel(type) {
      if (type === 'daily') return '당일';
      if (type === 'weekly') return '주간';
      return '월간';
    }

    function taskPeriod(task) {
      if (task.type === 'daily') return `일정: ${task.dateKey}`;
      if (task.type === 'weekly') return `주간: ${formatWeekLabel(task.weekKey)}`;
      return `월간: ${task.monthKey}`;
    }

    function renderTaskItem(task, compact = false) {
      const tagBadges = getTaskTagBadges(task);
      return `
        <div class="task-item ${task.completed ? 'completed' : ''}">
          <div class="task-row">
            <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask('${task.id}')" />
            <div class="task-main">
              <div class="task-title-row">
                <div class="task-title ${task.completed ? 'done' : ''}">${escapeHtml(task.title)}</div>
                <span class="badge dark">${taskTypeLabel(task.type)}</span>
                ${task.rolledOverCount > 0 ? `<span class="badge">이월 ${task.rolledOverCount}회</span>` : ''}
              </div>
              ${!compact && task.memo ? `<div class="task-memo">${escapeHtml(task.memo)}</div>` : ''}
              <div class="task-meta">
                <span>${escapeHtml(taskPeriod(task))}</span>
              </div>
              ${tagBadges ? `<div class="task-tags">${tagBadges}</div>` : ''}
            </div>
            <div class="task-actions">
              <button class="icon-btn" onclick="carryTask('${task.id}')" title="다음으로 이월">↷</button>
              <button class="icon-btn" onclick="deleteTask('${task.id}')" title="삭제">🗑</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderEmpty(text) {
      return `<div class="empty">${escapeHtml(text)}</div>`;
    }

    function renderDaily() {
      const tasks = state.tasks.filter(t => t.type === 'daily' && t.dateKey === state.filters.date).sort(sortTasks);
      return `
        <div class="card">
          <div class="card-body">
            <div class="toolbar">
              <h2 class="toolbar-title">당일 할일</h2>
              <input class="toolbar-control" type="date" value="${state.filters.date}" onchange="changeFilter('date', this.value)" />
            </div>
            <div class="task-list">
              ${tasks.length ? tasks.map(task => renderTaskItem(task)).join('') : renderEmpty('해당 날짜의 할일이 없습니다.')}
            </div>
          </div>
        </div>
      `;
    }

    function renderWeekly() {
      const weeklyTasks = state.tasks.filter(t => t.type === 'weekly' && t.weekKey === state.filters.week).sort(sortTasks);
      const dailyChildren = state.tasks
        .filter(t => t.type === 'daily' && inWeek(t.dateKey, state.filters.week))
        .sort((a, b) => {
          if (a.completed !== b.completed) return a.completed ? 1 : -1;
          if (a.dateKey !== b.dateKey) return a.dateKey.localeCompare(b.dateKey);
          return (b.updatedAt || 0) - (a.updatedAt || 0);
        });

      return `
        <div class="grid-2">
          <div class="card">
            <div class="card-body">
              <div class="toolbar">
                <h2 class="toolbar-title">그주 할일</h2>
                <input class="toolbar-control" type="date" value="${state.filters.week}" onchange="changeFilter('week', this.value)" />
              </div>
              <div class="small-note">범위: ${formatWeekLabel(state.filters.week)}</div>
              <div class="task-list">
                ${weeklyTasks.length ? weeklyTasks.map(task => renderTaskItem(task)).join('') : renderEmpty('해당 주의 주간업무가 없습니다.')}
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-body">
              <div class="toolbar">
                <h2 class="toolbar-title">이 주의 일일업무</h2>
              </div>
              <div class="task-list">
                ${dailyChildren.length ? dailyChildren.map(task => renderTaskItem(task, true)).join('') : renderEmpty('이 주에 연결된 일일업무가 없습니다.')}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderMonthly() {
      const monthlyTasks = state.tasks.filter(t => t.type === 'monthly' && t.monthKey === state.filters.month).sort(sortTasks);
      const weeklyChildren = state.tasks
        .filter(t => t.type === 'weekly' && sameMonth(t.weekKey, state.filters.month))
        .sort((a, b) => {
          if (a.completed !== b.completed) return a.completed ? 1 : -1;
          if (a.weekKey !== b.weekKey) return a.weekKey.localeCompare(b.weekKey);
          return (b.updatedAt || 0) - (a.updatedAt || 0);
        });
      const dailyChildren = state.tasks
        .filter(t => t.type === 'daily' && sameMonth(t.dateKey, state.filters.month))
        .sort((a, b) => {
          if (a.completed !== b.completed) return a.completed ? 1 : -1;
          if (a.dateKey !== b.dateKey) return a.dateKey.localeCompare(b.dateKey);
          return (b.updatedAt || 0) - (a.updatedAt || 0);
        });

      return `
        <div>
          <div class="card" style="margin-bottom:16px;">
            <div class="card-body">
              <div class="toolbar">
                <h2 class="toolbar-title">그달 할일</h2>
                <input class="toolbar-control" type="month" value="${state.filters.month}" onchange="changeFilter('month', this.value)" />
              </div>
              <div class="task-list">
                ${monthlyTasks.length ? monthlyTasks.map(task => renderTaskItem(task)).join('') : renderEmpty('해당 월의 월간업무가 없습니다.')}
              </div>
            </div>
          </div>
          <div class="grid-2-equal">
            <div class="card">
              <div class="card-body">
                <div class="toolbar"><h2 class="toolbar-title">이 달의 주간업무</h2></div>
                <div class="task-list">
                  ${weeklyChildren.length ? weeklyChildren.map(task => renderTaskItem(task, true)).join('') : renderEmpty('이 달의 주간업무가 없습니다.')}
                </div>
              </div>
            </div>
            <div class="card">
              <div class="card-body">
                <div class="toolbar"><h2 class="toolbar-title">이 달의 일일업무</h2></div>
                <div class="task-list">
                  ${dailyChildren.length ? dailyChildren.map(task => renderTaskItem(task, true)).join('') : renderEmpty('이 달의 일일업무가 없습니다.')}
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function getFilteredTasks() {
      const text = (state.search.text || '').trim().toLowerCase();
      const tagId = state.search.tagId;
      return state.tasks.filter(task => {
        const textMatch = !text || [task.title, task.memo].join(' ').toLowerCase().includes(text);
        const tagMatch = tagId === 'all' || (task.tagIds || []).includes(tagId);
        return textMatch && tagMatch;
      }).sort(sortTasks);
    }

    function renderSearch() {
      const filtered = getFilteredTasks();
      return `
        <div class="card">
          <div class="card-body">
            <div class="toolbar">
              <h2 class="toolbar-title">태그별 / 텍스트 검색</h2>
            </div>
            <div class="search-box">
              <div>
                <label class="sub-label">텍스트 검색</label>
                <input type="text" value="${escapeHtml(state.search.text)}" placeholder="제목 또는 메모 검색" oninput="changeSearchText(this.value)">
              </div>
              <div>
                <label class="sub-label">태그별 검색</label>
                <select onchange="changeSearchTag(this.value)">
                  <option value="all" ${state.search.tagId === 'all' ? 'selected' : ''}>전체 태그</option>
                  ${state.tags.map(tag => `<option value="${tag.id}" ${state.search.tagId === tag.id ? 'selected' : ''}>#${escapeHtml(tag.name)}</option>`).join('')}
                </select>
              </div>
            </div>
            <div class="search-result-count">검색 결과 ${filtered.length}개</div>
            <div class="task-list">
              ${filtered.length ? filtered.map(task => renderTaskItem(task)).join('') : renderEmpty('검색 결과가 없습니다.')}
            </div>
          </div>
        </div>
      `;
    }

    function render() {
      syncForm();
      if (state.view === 'daily') els.content.innerHTML = renderDaily();
      else if (state.view === 'weekly') els.content.innerHTML = renderWeekly();
      else if (state.view === 'monthly') els.content.innerHTML = renderMonthly();
      else els.content.innerHTML = renderSearch();
    }

    function changeFilter(type, value) {
      state.filters[type] = value;
      saveData();
      render();
    }

    function changeSearchText(value) {
      state.search.text = value;
      saveData();
      render();
    }

    function changeSearchTag(value) {
      state.search.tagId = value;
      saveData();
      render();
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    els.taskType.addEventListener('change', syncForm);
    els.dailyDate.addEventListener('change', e => changeFilter('date', e.target.value));
    els.weeklyDate.addEventListener('change', e => changeFilter('week', e.target.value));
    els.monthlyDate.addEventListener('change', e => changeFilter('month', e.target.value));
    els.addTaskBtn.addEventListener('click', addTask);
    els.addTagBtn.addEventListener('click', addTag);
    els.newTagName.addEventListener('keydown', e => {
      if (e.key === 'Enter') addTag();
    });

    els.tabs.forEach(btn => {
      btn.addEventListener('click', () => {
        state.view = btn.dataset.tab;
        saveData();
        render();
      });
    });

    window.toggleTask = toggleTask;
    window.deleteTask = deleteTask;
    window.carryTask = carryTask;
    window.changeFilter = changeFilter;
    window.changeSearchText = changeSearchText;
    window.changeSearchTag = changeSearchTag;
    window.editTag = editTag;
    window.deleteTag = deleteTag;

    autoRollover();
    syncForm();
    render();
  </script>
</body>
</html>
